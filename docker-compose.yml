services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - halalstream
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  youtube-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  halalstream:
    build: .
    restart: unless-stopped
    depends_on:
      - youtube-pot
    ports:
      - "8000:8000"
    environment:
      HALALSTREAM_STORAGE_DIR: /home/user/app/storage
      HALALSTREAM_DEMUCS_JOBS: "1"
      HALALSTREAM_DEMUCS_SEGMENT: "3"
      HALALSTREAM_DEMUCS_OVERLAP: "0.1"
      HALALSTREAM_YOUTUBE_CLIENTS: web,mweb
      HALALSTREAM_YOUTUBE_RETRIES: "2"
      HALALSTREAM_YOUTUBE_SOCKET_TIMEOUT: "20"
      HALALSTREAM_ALLOW_LINK_DOWNLOADS: "true"
      HALALSTREAM_YOUTUBE_POT_BASE_URL: http://youtube-pot:4416
      HALALSTREAM_YOUTUBE_FETCH_POT: always
      HALALSTREAM_YOUTUBE_REMOTE_COMPONENTS: ejs:github
      HALALSTREAM_YTDLP_COOKIES: /home/user/app/secrets/cookies.txt
    volumes:
      - halalstream-storage:/home/user/app/storage
      - ./secrets:/home/user/app/secrets

volumes:
  halalstream-storage:
  caddy-data:
  caddy-config:
